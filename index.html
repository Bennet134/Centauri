<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#fafaf8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Centauri">
  <link rel="manifest" href="manifest.json">
  <link id="apple-touch-icon" rel="apple-touch-icon" href="">
  <title>Centauri</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">

    <!-- App Header -->
    <header id="app-header">
      <div class="brand">
        <div class="brand-icon">
          <svg viewBox="0 0 192 192" xmlns="http://www.w3.org/2000/svg">
            <rect width="192" height="192" rx="42" fill="#f0ede6"/>
            <path d="M96,28 Q124,68 164,96 Q124,124 96,164 Q68,124 28,96 Q68,68 96,28Z" fill="#2d2d2d"/>
          </svg>
        </div>
        <span class="brand-name">Centauri</span>
      </div>
    </header>

    <div id="views">

      <!-- Heute -->
      <section id="view-today" class="view active" aria-label="Heute">
        <header class="view-header">
          <span class="header-date" id="header-date"></span>
          <h1>Heute</h1>
        </header>
        <div class="view-content" id="today-content"></div>
      </section>

      <!-- Verlauf -->
      <section id="view-history" class="view" aria-label="Verlauf">
        <header class="view-header">
          <h1>Verlauf</h1>
        </header>
        <div class="view-content" id="history-content"></div>
      </section>

      <!-- Grafik -->
      <section id="view-graph" class="view" aria-label="Grafik">
        <header class="view-header">
          <h1>Gewicht</h1>
        </header>
        <div class="view-content" id="graph-content"></div>
      </section>

      <!-- Woche -->
      <section id="view-weekly" class="view" aria-label="Woche">
        <header class="view-header">
          <h1>Diese Woche</h1>
        </header>
        <div class="view-content" id="weekly-content"></div>
      </section>

    </div>

    <!-- Navigation -->
    <nav id="bottom-nav" role="navigation" aria-label="Hauptnavigation">
      <button class="nav-btn active" data-view="today" aria-label="Heute">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20z"/>
          <polyline points="12 6 12 12 16 14"/>
        </svg>
        <span>Heute</span>
      </button>
      <button class="nav-btn" data-view="history" aria-label="Verlauf">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <line x1="8" y1="6" x2="21" y2="6"/>
          <line x1="8" y1="12" x2="21" y2="12"/>
          <line x1="8" y1="18" x2="21" y2="18"/>
          <circle cx="3" cy="6" r="0.5" fill="currentColor"/>
          <circle cx="3" cy="12" r="0.5" fill="currentColor"/>
          <circle cx="3" cy="18" r="0.5" fill="currentColor"/>
        </svg>
        <span>Verlauf</span>
      </button>
      <button class="nav-btn" data-view="graph" aria-label="Grafik">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
        </svg>
        <span>Grafik</span>
      </button>
      <button class="nav-btn" data-view="weekly" aria-label="Woche">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="18" rx="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
        <span>Woche</span>
      </button>
    </nav>

    <!-- Toast -->
    <div id="toast" class="toast" role="status" aria-live="polite"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
